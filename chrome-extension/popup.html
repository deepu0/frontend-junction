<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 400px;
        max-height: 600px;
        overflow-y: auto;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #1a1a2e;
        color: #e2e8f0;
        padding: 20px;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      h1::before {
        content: '⚡';
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: #a0aec0;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      input,
      textarea {
        width: 100%;
        background: #16213e;
        border: 1px solid #2d3748;
        border-radius: 6px;
        padding: 10px 12px;
        color: #e2e8f0;
        font-size: 13px;
        font-family: inherit;
        margin-bottom: 12px;
        transition: border-color 0.2s;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: #7c3aed;
      }
      input[readonly] {
        opacity: 0.7;
        cursor: default;
      }
      textarea {
        height: 200px;
        resize: vertical;
        line-height: 1.5;
      }
      .char-count {
        font-size: 11px;
        color: #718096;
        margin-top: -8px;
        margin-bottom: 14px;
        text-align: right;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #6d28d9;
      }
      button:disabled {
        background: #4a5568;
        cursor: not-allowed;
      }
      .status {
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        display: none;
      }
      .status.success {
        display: block;
        background: #064e3b;
        color: #6ee7b7;
      }
      .status.error {
        display: block;
        background: #450a0a;
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <h1>Frontend Junction</h1>

    <label for="url">Page URL</label>
    <input type="text" id="url" readonly />

    <label for="title">Title</label>
    <input type="text" id="title" placeholder="Page title..." />

    <label for="content">Content</label>
    <textarea id="content" placeholder="Extracting page content..."></textarea>
    <div class="char-count" id="char-count">0 chars</div>

    <button id="capture-btn">Capture & Send</button>
    <div class="status" id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
